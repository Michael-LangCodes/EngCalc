<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Document</title>
</head>
<body>
    <h1 id="title">Press Fit Calculator</h1>
    <form id="calculationInputs">
        <div class ='inputs'>
        <div class="form-group">
            <label for="pinID">Pin Inner Diameter</label>
            <input id="pinID" type="text">
        </div>

        <div class="form-group">
            <label for="pinOD">Pin Outer Diameter</label>
            <input id="pinOD" type="text">
        </div>

        <div class="form-group">
            <label for="pinLength">Pin Length</label>
            <input id="pinLength" type="text">
        </div>

        <div class="form-group">
            <label for="pinMat">Pin Material</label>
            <select name="pinMat" id="pinMat">
            <option value="none" selected disabled hidden>Choose Material</option>
            <option value="steel">Steel</option>
            <option value="aluminum">Aluminum</option>
            <option value="plastic">Plastic</option>
            </select>
            <!--<input id="pinMat" type="text">-->
        </div>
        
        <div class="form-group">
            <label for="hubID">Hub Inner Diameter</label>
            <input id="hubID" type="text">
        </div>

        <div class="form-group">
            <label for="hubOD">Hub Outer Diameter</label>
            <input id="hubOD" type="text">
        </div>

        <div class="form-group">
            <label for="hubLength">Hub Length</label>
            <input id="hubLength" type="text">
        </div>

        <div class="form-group">
            <label for="hubMat">Hub Material</label>
            <select name="hubMat" id="hubMat">
            <option value="none" selected disabled hidden>Choose Material</option>
            <option value="steel">Steel</option>
            <option value="aluminum">Aluminum</option>
            <option value="plastic">Plastic</option>
            </select>
        </div>
        </div>
        <button type="button" class="button">Submit</button>
    </form>

    <h2>Hoop Stress</h2>
    <p id="hoopStressOutput"></p>
    <h2>Press Force</h2>
    <p id="pressForce"></p>
    <h2>Press Torque</h2>
    <p id="pressTorque"></p>

    <div id="d3Container"></div>
    <br>
    <div id="plotlyContainer" style="width:400px;height:400px;"></div>
    <br>
    <canvas id="stressCanvas" width="300" height="300"></canvas>
    <script type = 'module' src="/js/main.js"></script>
</body>
</html>
