<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<body>
    <h1 id="title">Press Fit Calculator</h1>
    <form id="calculationInputs">
        <div class ='inputs'>
        <div class="form-group">
            <label for="pinID">Pin Inner Diameter</label>
            <input id="pinID" type="text">
        </div>

        <div class="form-group">
            <label for="pinOD">Pin Outer Diameter</label>
            <input id="pinOD" type="text">
        </div>

        <div class="form-group">
            <label for="pinLength">Pin Length</label>
            <input id="pinLength" type="text">
        </div>

        <div class="form-group">
            <label for="pinMat">Pin Material</label>
            <input id="pinMat" type="text">
        </div>
        
        <div class="form-group">
            <label for="holeOD">Hole Outer Diameter</label>
            <input id="holeOD" type="text">
        </div>

        <div class="form-group">
            <label for="holeID">Hole Inner Diameter</label>
            <input id="holeID" type="text">
        </div>

        <div class="form-group">
            <label for="holeLength">Hole Length</label>
            <input id="holeLength" type="text">
        </div>

        <div class="form-group">
            <label for="holeMat">Hole Material</label>
            <input id="holeMat" type="text">
        </div>
        </div>
        <button type="button" class="button">Submit</button>
    </form>

    <h2>Hoop Stress</h2>
    <p id="hoopStressOutput"></p>
    
    <script src="js/main.js"></script>
</body>
</html>
