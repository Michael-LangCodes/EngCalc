<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<body>
    <h1 id="title">Press Fit Calculator</h1>
    <form id="calculationInputs">
        <div class="form-group">
            <label for="pinID">Pin Inner Diameter</label>
            <input id="pinID" type="text">
        </div>

        <div class="form-group">
            <label for="pinOD">Pin Outer Diameter</label>
            <input id="pinOD" type="text">
        </div>

        <div class="form-group">
            <label for="password">Pin Length</label>
            <input id="password" type="password">
        </div>

  <button type="submit">Submit</button>
        
        <ul>
            <li>
                    <label for="pinOD">Pin Outer Diameter:</label>
                    <input type="text" id="pinOD" name="pinOD">
            </li>
            <li>
                    <label for="pinLength">Pin Length:</label>
                    <input type="text" id="pinLength" name="pinOD">
            </li>
            <li>
                <label for="pinMaterial">Pin Material:</label>
                <input type="text" id="pinMaterial" name="pinMaterial">
            </li>
            <li>
                <label for="holeOD">Hole Outer Diameter:</label>
                <input type="text" id="holeOD" name="holeOD">
            </li>
            <li>
                <label for="holeID">Hole Inner Diameter:</label>
                <input type="text" id="holeID" name="holeID">
            </li>
            <li>
                <label for="holeLength">Hole Length:</label>
                <input type="text" id="holeLength" name="holeLength">
            </li>
            <li>
                <label for="holeMaterial">Hole Material:</label>
                <input type="text" id="pinMaterial" name="pinMaterial">
            </li>
        </ul>
    </form>

    <h2>Hoop Stress</h2>
    <p id="hoopStressOutput"></p>
    
    <script src="js/main.js"></script>
</body>
</html>
